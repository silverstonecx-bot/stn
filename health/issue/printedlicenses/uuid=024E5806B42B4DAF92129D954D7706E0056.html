    /* float label helper */

    /* Right-side data panel */
    .data-panel-toggle{
      position:fixed; inset-block-end:16px; inset-inline-end:16px; z-index:999;

      position:fixed; inset-block:0; inset-inline-end:-380px; width:360px; background:#fff; z-index:1000;
