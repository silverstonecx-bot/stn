    /* float label helper */
    .has-float-label{ position:relative; }
    .has-float-label > span{
      position:absolute; right:12px; top:-8px;
      background:#fff; padding:0 6px; font-size:.85rem; color:#000;
    }

    /* Right-side data panel */
    .data-panel-toggle{
      position:fixed; inset-block-end:16px; inset-inline-end:16px; z-index:999;
      border:0; background:#0d6efd; color:#fff; padding:.6rem .9rem;
      border-radius:999px; box-shadow:0 6px 16px rgba(0,0,0,.12);
    }
    .data-panel{
      position:fixed; inset-block:0; inset-inline-end:-380px; width:360px; background:#fff; z-index:1000;

      transition:inset-inline-end .28s ease;
      display:flex; flex-direction:column; border-inline-start:1px solid var(--line);
    }
    .data-panel.open{ inset-inline-end:0; }
    .data-panel header{
      display:flex; align-items:center; justify-content:space-between; gap:8px;
      padding:12px 14px; border-bottom:1px solid var(--line);
      background:#fff; position:sticky; inset-block-start:0; z-index:1;
    }
    .data-panel .panel-body{ padding:14px; overflow:auto; }
    .hint{ color:#64748b; font-size:.85rem; }
